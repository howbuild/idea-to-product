<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Idea to Product Structural Wireframe</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f8fafc; color: #111827; }
    main { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
    section { border: 1px solid #d1d5db; background: #fff; padding: 20px; margin: 16px 0; }
    button, input, select { font: inherit; padding: 10px 12px; }
    .note { color: #4b5563; }
  </style>
</head>
<body>
  <main data-req-id="wireframe-root">
    <p class="note" data-req-id="wireframe-notice">This is a structural prototype for product discussion. It is not production code or final UI design.</p>
    <section data-req-id="core-flow-section">
      <h1 data-req-id="product-title">Product Title</h1>
      <p data-req-id="core-user-problem">Core user problem appears here.</p>
    </section>
    <section data-req-id="primary-action-section">
      <button data-req-id="primary-action-button">Primary action</button>
      <p data-req-id="primary-action-policy-note">Policy and AC links should be decided for this action.</p>
    </section>
    <section data-req-id="empty-state-section">
      <p data-req-id="empty-state-message">Empty state message.</p>
    </section>
  </main>
</body>
</html>
